    @TaskAction
    final void run() {
        logger.lifecycle('Performing ASM preprocessing...')

        final def inputDir = inputClassesDir.get().asFile
        final def outputDir = outputClassesDir.get().asFile

        fs.delete {
            it.delete(outputDir)
        }

        final def privatizedMethodsByClass = new HashMap<String, Set<String>>()
        final def constantFields = new HashMap<String, Object>()

        final def verbose = false
        final def constantFold = true

        inputDir.eachFileRecurse { final inputFile ->
            if (!inputFile.file) {
                return
            }

            final def relative = inputDir.toPath().relativize(inputFile.toPath())
            final def outputFile = new File(outputDir, relative.toString())

            /*
             * Non-class files must be copied as-is
             */
            if (!inputFile.name.endsWith('.class')) {
                fs.copy {
                    it.from(inputFile)
                    it.into(outputFile.parentFile)
                    it.rename { outputFile.name }
                }
                return
            }

            final def bytes = inputFile.bytes

            final def cr = new ClassReader(bytes)
            final def cn = new ClassNode()

            cr.accept(cn, ClassReader.EXPAND_FRAMES)

            def changed = false
            def renamed = false

            if (constantFold) {
                final def fieldsBySig = HashMap.<String, FieldNode>newHashMap(cn.fields.size())

                for (final def f : cn.fields) {
                    fieldsBySig[f.name + f.desc] = f
                }

                for (final def mn : cn.methods) {
                    if ('<clinit>' != mn.name || null == mn.instructions) continue

                    for (def insn = mn.instructions.first; insn != null; ) {
                        final def next = insn.next

                        /*
                         * --------------------------------------------------
                         * 1. TimeUnit constant folding
                         * --------------------------------------------------
                         */
                        if (Opcodes.INVOKEVIRTUAL == insn.opcode) {
                            final def mInsn = (MethodInsnNode) insn

                            if ('java/util/concurrent/TimeUnit' == mInsn.owner
                                    && '(J)J' == mInsn.desc
                                    && mInsn.name.startsWith('to')) {

                                final def constNode = insn.previous
                                final def enumNode  = constNode?.previous

                                if (enumNode instanceof FieldInsnNode
                                        && Opcodes.GETSTATIC == enumNode.opcode
                                        && 'java/util/concurrent/TimeUnit' == enumNode.owner) {
                                    long value

                                    switch (constNode.opcode) {
                                        case Opcodes.LCONST_0: value = 0L; break
                                        case Opcodes.LCONST_1: value = 1L; break
                                        case Opcodes.LDC:
                                            if (constNode instanceof LdcInsnNode && constNode.cst instanceof Long) {
                                                value = constNode.cst as long
                                            } else {
                                                insn = next; continue
                                            }
                                            break
                                        default:
                                            insn = next; continue
                                    }

                                    final def timeUnit = TimeUnit.valueOf(enumNode.name)
                                    long result

                                    switch (mInsn.name) {
                                        case 'toNanos':   result = timeUnit.toNanos(value); break
                                        case 'toMicros':  result = timeUnit.toMicros(value); break
                                        case 'toMillis':  result = timeUnit.toMillis(value); break
                                        case 'toSeconds': result = timeUnit.toSeconds(value); break
                                        case 'toMinutes': result = timeUnit.toMinutes(value); break
                                        case 'toHours':   result = timeUnit.toHours(value); break
                                        case 'toDays':    result = timeUnit.toDays(value); break
                                        default:
                                            logger.warn("unsupported TimeUnit method for compile-time evaluation used: ${mInsn.name}"); insn = next; continue
                                    }

                                    final def ldc = new LdcInsnNode(result)
                                    mn.instructions.insert(insn, ldc)
                                    mn.instructions.remove(enumNode)
                                    mn.instructions.remove(constNode)
                                    mn.instructions.remove(insn)

                                    changed = true
                                    insn = ldc
                                    if (verbose) BatchedMessageCollector.add(26, "Replaced TimeUnit conversion with evaluated value: TimeUnit.${enumNode.name}.${mInsn.name}(${value}) = ${result} inlined.")
                                    continue
                                }
                            }
                        }

                        /*
                         * --------------------------------------------------
                         * 2 + 3. Collect & remove constant PUTSTATIC
                         * --------------------------------------------------
                         */
                        if (Opcodes.PUTSTATIC == insn.opcode) {
                            final def put = (FieldInsnNode) insn
                            final def prev = put.previous

                            final def f = fieldsBySig[put.name + put.desc]

                            if ((0 != (f.access & Opcodes.ACC_PRIVATE)) && (0 != (f.access & Opcodes.ACC_STATIC)) && (0 != (f.access & Opcodes.ACC_FINAL)) && prev instanceof LdcInsnNode) {
                                constantFields[put.owner + put.name + put.desc] = prev.cst

                                mn.instructions.remove(prev)
                                mn.instructions.remove(insn)

                                changed = true
                                if (verbose) BatchedMessageCollector.add(29, "Removed putstatic to constant field ${cn.name}#${f.name} = ${prev.cst}")
                            }
                        }

                        insn = next
                    }
                }
            }

            final def it = cn.fields.iterator()

            while (it.hasNext()) {
                final def f = it.next()
                final def key = cn.name + f.name + f.desc

                if (constantFields.containsKey(key)) {
                    it.remove()
                    changed = true
                    if (verbose) BatchedMessageCollector.add(28, "Removed constant folded field ${cn.name}#${f.name}")
                }
            }

            final def clsAnns = cn.invisibleAnnotations
            final def privateClass = 0 != (cn.access & Opcodes.ACC_PRIVATE)

            def privateFields = false

            if (null != clsAnns) {
                for (final def an : clsAnns) {
                    switch (an.desc) {
                        case PRIVATE_FIELDS_DESC:
                            privateFields = true
                            break
                        case SYNTHETIC_DESC:
                            changed = true
                            cn.access |= Opcodes.ACC_SYNTHETIC
                            if (verbose) BatchedMessageCollector.add(0, "Added ACC_SYNTHETIC to ${cn.name}")
                            break
                        case PACKAGE_PRIVATE_DESC:
                            changed = true
                            cn.access &= ~Opcodes.ACC_PUBLIC
                            cn.access &= ~Opcodes.ACC_PROTECTED
                            if (privateClass) {
                                logger.error("Already private class ${cn.name} annotated with @PackagePrivate")
                            }
                            if (verbose) BatchedMessageCollector.add(1, "Added package-private to ${cn.name}")
                            break
                        case PRIVATE_DESC:
                            changed = true
                            cn.access &= ~Opcodes.ACC_PUBLIC
                            cn.access &= ~Opcodes.ACC_PROTECTED
                            cn.access |= Opcodes.ACC_PRIVATE
                            if (verbose) BatchedMessageCollector.add(2, "Added private to ${cn.name}")
                            break
                        case NAME_DESC:
                            final def vals = an.values

                            for (def i = 0; i < vals.size(); i += 2) {
                                if ('value' != vals[i]) {
                                    continue
                                }

                                final def oldName = mn.name
                                final def newName = vals[i + 1]

                                if (oldName != newName) {
                                    changed = true
                                    cn.name = newName
                                    if (verbose) BatchedMessageCollector.add(3, "Renamed ${oldName} into ${cn.name}")
                                }
                            }
                            break
                    }
                }
            }

            for (final def fn : cn.fields) {
                final def anns = fn.invisibleAnnotations

                if (null != anns) {
                    for (final def an : anns) {
                        switch (an.desc) {
                            case SYNTHETIC_DESC:
                                fn.access |= Opcodes.ACC_SYNTHETIC
                                changed = true
                                if (verbose) BatchedMessageCollector.add(4, "Added ACC_SYNTHETIC to ${cn.name}#${fn.name}")
                                break

                            case PACKAGE_PRIVATE_DESC:
                                fn.access &= ~Opcodes.ACC_PUBLIC
                                fn.access &= ~Opcodes.ACC_PROTECTED
                                changed = true
                                if (0 != (fn.access & Opcodes.ACC_PRIVATE)) {
                                    logger.error("Already private field ${cn.name}#${fn.name} annotated with @PackagePrivate")
                                }
                                if (verbose) BatchedMessageCollector.add(5, "Added package-private to ${cn.name}#${fn.name}")
                                break

                            case PRIVATE_DESC:
                                fn.access &= ~Opcodes.ACC_PUBLIC
                                fn.access &= ~Opcodes.ACC_PROTECTED
                                fn.access |= Opcodes.ACC_PRIVATE
                                changed = true
                                if (verbose) BatchedMessageCollector.add(6, "Added private to ${cn.name}#${fn.name}")
                                break

                            case NAME_DESC:
                                final def vals = an.values
                                for (def i = 0; i < vals.size(); i += 2) {
                                    if ('value' == vals[i]) {
                                        final def oldName = fn.name
                                        final def newName = vals[i + 1]
                                        fn.name = newName
                                        changed = true
                                        if (verbose) BatchedMessageCollector.add(7, "Renamed ${cn.name}#${oldName} into ${cn.name}#${fn.name}")
                                    }
                                }
                                break
                        }
                    }
                }

                if (privateFields) {
                    fn.access &= ~Opcodes.ACC_PUBLIC
                    fn.access &= ~Opcodes.ACC_PROTECTED
                    fn.access |= Opcodes.ACC_PRIVATE
                    changed = true
                    if (verbose) BatchedMessageCollector.add(8, "Removed public from field ${cn.name}#${fn.name}")
                    if (verbose) BatchedMessageCollector.add(9, "Removed protected from field ${cn.name}#${fn.name}")
                    if (verbose) BatchedMessageCollector.add(10, "Add private to field ${cn.name}#${fn.name}")
                }
            }

            for (final def mn : cn.methods) {
                final def isBridge = 0 != (mn.access & Opcodes.ACC_BRIDGE)

                /*
                 * METHOD ANNOTATIONS
                 */
                final def anns =
                        mn.invisibleAnnotations

                if (null != anns) {
                    for (final def an : anns) {
                        if (NAME_DESC == an.desc) {
                            final def vals = an.values

                            for (def i = 0; i < vals.size(); i += 2) {
                                if ('value' != vals[i]) {
                                    continue
                                }

                                final def oldName = mn.name
                                final def newName = vals[i + 1]

                                if (oldName != newName) {
                                    changed = true
                                    renamed = true
                                    mn.name = newName
                                    if (verbose) BatchedMessageCollector.add(11, "Renamed ${cn.name}#${oldName} into ${cn.name}#${mn.name}")
                                }
                            }
                        }

                        if (SYNTHETIC_DESC == an.desc) {
                            changed = true
                            mn.access |= Opcodes.ACC_SYNTHETIC
                            if (verbose) BatchedMessageCollector.add(12, "Added ACC_SYNTHETIC to ${cn.name}#${mn.name}")
                        }

                        if (PACKAGE_PRIVATE_DESC == an.desc && !isBridge) {
                            changed = true
                            mn.access &= ~Opcodes.ACC_PUBLIC
                            mn.access &= ~Opcodes.ACC_PROTECTED
                            if (0 != (mn.access & Opcodes.ACC_PRIVATE)) {
                                logger.error("Already private method ${cn.name}#${mn.name} annotated with @PackagePrivate")
                            }
                            if (verbose) BatchedMessageCollector.add(13, "Made method package-private: ${cn.name}#${mn.name}")
                        }

                        if (PRIVATE_DESC == an.desc && !isBridge) {
                            changed = true
                            mn.access &= ~Opcodes.ACC_PUBLIC
                            mn.access &= ~Opcodes.ACC_PROTECTED
                            mn.access |= Opcodes.ACC_PRIVATE
                            privatizedMethodsByClass.computeIfAbsent(cn.name, className -> new HashSet<String>()).add("${mn.name}${mn.desc}")
                            if (verbose) BatchedMessageCollector.add(14, "Made method private: ${cn.name}#${mn.name}")
                        }

                        if (BRIDGE_DESC == an.desc) {
                            changed = true
                            mn.access |= Opcodes.ACC_BRIDGE
                            if (verbose) BatchedMessageCollector.add(15, "Added ACC_BRIDGE to ${cn.name}#${mn.name}")
                        }
                    }
                }
            }

            final def classPublic = 0 != (cn.access & Opcodes.ACC_PUBLIC)

            /*
             * -----------------------------
             * CLASS PROCESSING
             * -----------------------------
             */
            if (0 != (cn.access & Opcodes.ACC_SYNTHETIC)) {
                changed = true
                cn.access |= Opcodes.ACC_FINAL
                if (verbose) BatchedMessageCollector.add(16, "Made ${cn.name} final")
            }

            final def isInterface = 0 != (cn.access & Opcodes.ACC_INTERFACE)

            if (classPublic) {
                if (cn.name.contains('mixin') && !cn.name.contains('accessor')) {
                    logger.warn('Non-accessor mixin class declared public')
                }
            } else {
                for (final def fn : cn.fields) {
                    if (0 != (fn.access & Opcodes.ACC_PUBLIC)) {
                        changed = true
                        fn.access &= ~Opcodes.ACC_PUBLIC
                        if (verbose) BatchedMessageCollector.add(17, "Removed public from field ${cn.name}#${fn.name}")
                    }

                    if (0 != (fn.access & Opcodes.ACC_PROTECTED)) {
                        changed = true
                        fn.access &= ~Opcodes.ACC_PROTECTED
                        if (verbose) BatchedMessageCollector.add(18, "Removed protected from field ${cn.name}#${fn.name}")
                    }
                }

                for (final def mn : cn.methods) {
                    final def isBridge = 0 != (mn.access & Opcodes.ACC_BRIDGE)

                    if ('<clinit>' == mn.name || 0 != (mn.access & Opcodes.ACC_PRIVATE) || AsmPreprocessTask.hasAnnotation(mn, MIXIN_OVERWRITE_DESC)) {
                        continue
                    }

                    if (0 == (mn.access & Opcodes.ACC_STATIC) && '<init>' != mn.name && AsmPreprocessTask.overridesSomething(cn, mn, processorClasspath.files)) {
                        continue
                    }

                    if (0 == (mn.access & Opcodes.ACC_BRIDGE) && mn.name.contains('mixin')) {
                        logger.warn("Method ${cn.name}#${mn.name} should be package-private or private")
                    }

                    if (0 != (mn.access & Opcodes.ACC_PUBLIC) && !isBridge && !isInterface) {
                        changed = true
                        mn.access &= ~Opcodes.ACC_PUBLIC
                        if (verbose) BatchedMessageCollector.add(19, "Removed public from method ${cn.name}#${mn.name}")
                    }

                    if (0 != (mn.access & Opcodes.ACC_PROTECTED) && !isBridge) {
                        changed = true
                        mn.access &= ~Opcodes.ACC_PROTECTED
                        if (verbose) BatchedMessageCollector.add(20, "Removed protected from method ${cn.name}#${mn.name}")
                    }
                }
            }

            /*
             * -----------------------------
             * METHOD PROCESSING
             * -----------------------------
             */
            final def isRecord = 0 != (cn.access & Opcodes.ACC_RECORD)

            for (final def mn : cn.methods) {
                /*
                 * FINALIZATION
                 */
                final def abstractMethod = 0 != (mn.access & Opcodes.ACC_ABSTRACT)
                final def bridge = 0 != (mn.access & Opcodes.ACC_BRIDGE)
                final def synthetic = 0 != (mn.access & Opcodes.ACC_SYNTHETIC)

                if (!isInterface && !abstractMethod && '<clinit>' != mn.name && '<init>' != mn.name && 0 == (mn.access & Opcodes.ACC_FINAL)) {
                    if ((isRecord || bridge || synthetic || mn.name.contains('$') || 'values' == mn.name || 'valueOf' == mn.name)) {
                        changed = true
                        mn.access |= Opcodes.ACC_FINAL
                        if (!isRecord && !bridge && !synthetic && 'values' != mn.name && 'valueOf' != mn.name) {
                            logger.warn("Method ${cn.name}#${mn.name} should be final")
                        }
                        if (verbose) BatchedMessageCollector.add(21, "Added final to ${cn.name}#${mn.name}")
                    } else {
                        logger.warn("Method ${cn.name}#${mn.name} should be final")
                    }
                }

                /*if (bridge || synthetic) {
                    def mod = AsmPreprocessTask.methodAccessToString(mn)
                    mod += " ${cn.name}.${mn.name}()"

                    logger.lifecycle(mod)
                }*/
            }

            /*for (final def fn : cn.fields) {
                if (0 != (fn.access & Opcodes.ACC_SYNTHETIC)) {
                    def mod = AsmPreprocessTask.fieldAccessToString(fn)
                    mod += " ${cn.name}.${fn.name}"

                    logger.lifecycle(mod)
                }
            }*/

            if (0 == (cn.access & Opcodes.ACC_FINAL) && !isInterface && 0 == (cn.access & Opcodes.ACC_ABSTRACT)) {
                logger.warn("Non-final class: ${cn.name}")
            }

            /*if (classPublic && cn.name.contains('$')) {
                logger.warn("Public inner class: ${cn.name}")
            }*/

            for (final def mn : cn.methods) {
                if (0 == (mn.access & Opcodes.ACC_FINAL) && '<init>' != mn.name && '<clinit>' != mn.name && !isInterface) {
                    logger.warn("Non-final method: ${cn.name}#${mn.name}")
                }
            }

            final def privatized = privatizedMethodsByClass.getOrDefault(cn.name, Collections.emptySet())

            final def methodsBySig = HashMap.<String, MethodNode>newHashMap(cn.methods.size())

            for (final def m : cn.methods) {
                methodsBySig[m.name + m.desc] = m
            }

            for (final def ownerMethod : cn.methods) {
                if (null == ownerMethod.instructions) continue

                for (def insn = ownerMethod.instructions.first; insn != null;) {
                    final def next = insn.next

                    switch (insn.opcode) {
                        /*
                         * ------------------------------
                         * GETSTATIC constant folding
                         * ------------------------------
                         */
                        case Opcodes.GETSTATIC:
                            if (constantFold) {
                                final def fieldInsn = (FieldInsnNode) insn
                                final def value = constantFields[fieldInsn.owner + fieldInsn.name + fieldInsn.desc]

                                if (null != value) {
                                    ownerMethod.instructions.set(insn, new LdcInsnNode(value))
                                    changed = true
                                    if (verbose) BatchedMessageCollector.add(27, "Inlined constant ${fieldInsn.owner}.${fieldInsn.name} = ${value} in ${cn.name}.${ownerMethod.name}")
                                }
                            }
                            break

                        /*
                         * ------------------------------
                         * invokevirtual to invokespecial conversion
                         * ------------------------------
                         */
                        case Opcodes.INVOKEVIRTUAL:
                            final def mInsn = (MethodInsnNode) insn
                            if (cn.name != mInsn.owner) break

                            final def key = mInsn.name + mInsn.desc
                            final def target = methodsBySig[key]
                            if (null == target) break

                            if (0 == (target.access & Opcodes.ACC_PRIVATE)) break
                            if (0 != (target.access & Opcodes.ACC_STATIC)) break

                            if (privatized.contains(key)) {
                                if (!changed) throw new AssertionError("changed != true shouldn't happen here after ASM privatized the method before, class=${cn.name},method=${ownerMethod.name},callingToMethod=${mInsn.name},desc=${mInsn.desc}")
                                if (verbose) BatchedMessageCollector.add(22, "Fixed invokevirtual --> invokespecial for ASM-privatized method: ${cn.name}#${mInsn.name}${mInsn.desc}")
                            } else {
                                if (changed) {
                                    if (verbose) BatchedMessageCollector.add(23, "Fixed invokevirtual --> invokespecial for javac generated method: ${cn.name}#${mInsn.name}${mInsn.desc}")
                                } else {
                                    if (verbose) BatchedMessageCollector.add(24, "Fixed invokevirtual --> invokespecial for javac generated method: ${cn.name}#${mInsn.name}${mInsn.desc} - the ASM processor did not touch this class before.")
                                }
                            }

                            ownerMethod.instructions.set(mInsn, new MethodInsnNode(Opcodes.INVOKESPECIAL, mInsn.owner, mInsn.name, mInsn.desc, mInsn.itf))
                            changed = true
                            break
                    }

                    insn = next
                }
            }

            def output = bytes
            def cw = new ClassWriter(0)

            if (changed) {
                if (renamed) {
                    cw = new ClassWriter(ClassWriter.COMPUTE_FRAMES | ClassWriter.COMPUTE_MAXS) {
                        @Override
                        protected final String getCommonSuperClass(final String type1, final String type2) {
                            // We get class not found errors with default ASM implementation of this method, so override it to always return Object
                            // Does not seem to cause any problems, but might be fixed later if we tweak compileClasspath passed to the task.
                            return 'java/lang/Object'
                        }
                    }
                }

                cn.accept(cw)
                output = cw.toByteArray()
            }

            try {
                if (verbose) BatchedMessageCollector.add(25, "Checking class ${cn.name} changed=${changed},renamed=${renamed}")
                cn.accept(new CheckClassAdapter(cw, true))
            } catch (final Throwable error) {
                throw new RuntimeException("class ${cn.name} has error: ${error.message}")
            }

            if (!changed) {
                fs.copy {
                    it.from(inputFile)
                    it.into(outputFile.parentFile)
                    it.rename { outputFile.name }
                }
                return
            }

            outputFile.parentFile.mkdirs() // allowed here: we're writing declared @OutputDirectory

            outputFile.newOutputStream().withCloseable {
                it.write(output)
            }
        }

        if (constantFold) {
            // We must do a second pass to handle inner class'es getstatic calls to the outer class constant-replaced fields.
            outputDir.eachFileRecurse { final inputFile ->
                if (!inputFile.file) {
                    return
                }

                final def relative = outputDir.toPath().relativize(inputFile.toPath())
                final def outputFile = new File(outputDir, relative.toString())

                final def bytes = inputFile.bytes

                final def cr = new ClassReader(bytes)
                final def cn = new ClassNode()

                cr.accept(cn, ClassReader.EXPAND_FRAMES)

                def changed = false
                final def renamed = false

                for (final def ownerMethod : cn.methods) {
                    if (null == ownerMethod.instructions) continue

                    for (def insn = ownerMethod.instructions.first; insn != null;) {
                        final def next = insn.next

                        switch (insn.opcode) {
                            /*
                             * ------------------------------
                             * GETSTATIC constant folding
                             * ------------------------------
                             */
                            case Opcodes.GETSTATIC:
                                final def fieldInsn = (FieldInsnNode) insn
                                final def value = constantFields[fieldInsn.owner + fieldInsn.name + fieldInsn.desc]

                                if (null != value) {
                                    ownerMethod.instructions.set(insn, new LdcInsnNode(value))
                                    changed = true
                                    if (verbose) BatchedMessageCollector.add(30, "Inlined constant (second pass) ${fieldInsn.owner}.${fieldInsn.name} = ${value} in ${cn.name}.${ownerMethod.name}")
                                }
                                break
                        }

                        insn = next
                    }
                }

                def output = bytes
                def cw = new ClassWriter(0)

                if (changed) {
                    if (renamed) {
                        cw = new ClassWriter(ClassWriter.COMPUTE_FRAMES | ClassWriter.COMPUTE_MAXS) {
                            @Override
                            protected final String getCommonSuperClass(final String type1, final String type2) {
                                // We get class not found errors with default ASM implementation of this method, so override it to always return Object
                                // Does not seem to cause any problems, but might be fixed later if we tweak compileClasspath passed to the task.
                                return 'java/lang/Object'
                            }
                        }
                    }

                    cn.accept(cw)
                    output = cw.toByteArray()
                }

                try {
                    if (verbose) BatchedMessageCollector.add(25, "Checking class (second pass) ${cn.name} changed=${changed},renamed=${renamed}")
                    cn.accept(new CheckClassAdapter(cw, true))
                } catch (final Throwable error) {
                    throw new RuntimeException("class ${cn.name} has error (second pass): ${error.message}")
                }

                outputFile.newOutputStream().withCloseable {
                    it.write(output)
                }
            }
        }

        if (verbose) {
            BatchedMessageCollector.logAll(logger)
        }
    }
}

